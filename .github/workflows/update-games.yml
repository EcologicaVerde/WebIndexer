name: Atualizar Contagem de Jogos

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-games-count:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install pako
      
      - name: Run update script
        run: node update-games-count.js
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add games-count.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: atualizar contagem de jogos [skip ci]"
          git push
